<!DOCTYPE html>
<html>
<head>
<title>Web AR Example</title>
<script
src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-
org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body>
<a-scene embedded arjs="sourceType: webcam;">
<a-marker preset="hiro">
<a-box position="-1 1 -3" rotation="0 45 0" color="#7BC8A4"></a-box>
<a-sphere position="0 1.25 -5" radius="1.7" color="#EF2D5E"></a-
sphere>
<a-cylinder position="1 0.75 -3" radius="2.5" height="1.5"
color="#FF9224"></a-cylinder>
</a-marker>
<a-entity camera></a-entity>
</a-scene>
</body>
</html>
