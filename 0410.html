<!DOCTYPE html>
<html>
<head>
<title>A-Frame 3D Basic Example</title>
<script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
</head>
<body>
<a-scene>
<a-box position="-1 1 -3" rotation="0 45 0" color="#7BC8A4"></a-box>
<a-sphere position="0 1.25 -5" radius="1.7" color="#EF2D5E"></a-
sphere>
<a-cylinder position="1 0.75 -3" radius="2.5" height="1.5"
color="#FF9224"></a-cylinder>
<a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="6"
color="#02C874"></a-plane>
<a-sky color="#EBD3E8"></a-sky>
</a-scene>
</</body>
</html>
